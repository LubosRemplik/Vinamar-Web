services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vinamar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vinamar}
      POSTGRES_DB: ${POSTGRES_DB:-vinamar}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vinamar}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://vinamar:vinamar@db:5432/vinamar}
      API_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-owner}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      OWNER_EMAIL: ${OWNER_EMAIL:-owner@example.com}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-vinamar@example.com}
      TRAVELPAYOUTS_TOKEN: ${TRAVELPAYOUTS_TOKEN:-}
      TRAVELPAYOUTS_MARKER: ${TRAVELPAYOUTS_MARKER:-}
      FLIGHTS_HORIZON_MONTHS: ${FLIGHTS_HORIZON_MONTHS:-9}
      # Empty by default → the manual POST /api/admin/flights/refresh endpoint is
      # disabled until an operator sets a high-entropy token (openssl rand -hex 32).
      # The daily cron refresh runs regardless.
      FLIGHTS_REFRESH_TOKEN: ${FLIGHTS_REFRESH_TOKEN:-}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

  web:
    build: ./web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next

volumes:
  db_data:
